# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

body = """

{% if version -%}
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {% if commit.breaking %}**Breaking:** {% endif %}{{ commit.message | split(pat="\n") | first | trim | upper_first }}\
{% endfor %}
{% endfor %}
"""

footer = """
{% for release in releases -%}
{% if release.version and release.previous.version -%}
[{{ release.version }}]: https://github.com/go-surreal/som/compare/{{ release.previous.version }}...{{ release.version }}
{% endif -%}
{% endfor -%}
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
filter_commits = true
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "oldest"
topo_order = false

commit_parsers = [
    { message = "^feat",     group = "<!-- 0 -->Added" },
    { message = "^fix",      group = "<!-- 2 -->Fixed" },
    { message = "^perf",     group = "<!-- 1 -->Changed" },
    { message = "^refactor", group = "<!-- 1 -->Changed" },
    { message = "^revert",   group = "<!-- 1 -->Changed" },
    { message = "^docs",     group = "<!-- 3 -->Documentation" },
    { message = "^chore",    skip = true },
    { message = "^ci",       skip = true },
    { message = "^build",    skip = true },
    { message = "^test",     skip = true },
    { message = "^style",    skip = true },
]
