name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.19.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:

  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match vX.Y.Z, got: ${{ inputs.version }}"
            exit 1
          fi

      - name: Setup Mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Generate CHANGELOG
        run: mise exec -- git-cliff --config cliff.toml --tag ${{ inputs.version }} --output CHANGELOG.md

      - name: Bump retract directive in go.mod
        run: |
          VERSION="${{ inputs.version }}"
          MAJOR=$(echo "$VERSION" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+)$/\1/')
          MINOR=$(echo "$VERSION" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+)$/\2/')
          PATCH=$(echo "$VERSION" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+)$/\3/')
          if (( PATCH > 0 )); then
            NEW_BOUND="v${MAJOR}.${MINOR}.$((PATCH - 1))"
          elif (( MINOR > 0 )); then
            NEW_BOUND="v${MAJOR}.$((MINOR - 1)).99"
          else
            echo "Cannot compute retract upper bound for ${VERSION}."
            exit 1
          fi
          sed -i -E "s|^retract \[v0\.0\.0, v[0-9]+\.[0-9]+\.[0-9]+\]|retract [v0.0.0, ${NEW_BOUND}]|" go.mod
          if git diff --quiet -- go.mod; then
            echo "retract directive in go.mod did not change; expected '[v0.0.0, vX.Y.Z]' single-line form."
            exit 1
          fi
          echo "Updated retract directive:"
          grep "^retract" go.mod

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: release/${{ inputs.version }}
          base: main
          title: "chore(release): prepare ${{ inputs.version }}"
          commit-message: "chore(release): prepare ${{ inputs.version }}"
          body: |
            Automated release preparation for **${{ inputs.version }}**.

            - `CHANGELOG.md` regenerated via [git-cliff](https://git-cliff.org)
            - `retract` upper bound bumped in `go.mod`

            Review the diff, merge, then tag `${{ inputs.version }}` on `main`.

            > Note: PRs opened by `GITHUB_TOKEN` do not trigger CI. If a full CI run is needed, close and reopen this PR, or push an empty commit.
          delete-branch: true
